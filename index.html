<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clothing Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a90e2; --danger: #ff4757; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .upload-box { max-width: 550px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .drop-area { border: 2px dashed #cbd5e0; padding: 40px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; color: #718096; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 15px; }
        .ai-tags { font-size: 0.8rem; color: var(--primary); font-weight: 600; background: #eef2ff; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 5px; }
        .delete-btn { color: var(--danger); background: none; border: none; text-decoration: underline; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="upload-box">
    <input type="text" id="title" placeholder="Title (Optional)">
    <div class="drop-area" id="dropArea">Click to upload images</div>
    <input type="file" id="fileInput" hidden multiple>
    <button id="uploadBtn" onclick="uploadImage()">Upload</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
let selectedFiles = [];
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');

dropArea.onclick = () => fileInput.click();
fileInput.onchange = () => { selectedFiles = Array.from(fileInput.files); dropArea.innerText = `${selectedFiles.length} files selected`; };

async function uploadImage() {
    if (selectedFiles.length === 0) return alert("Select images!");
    uploadBtn.disabled = true;

    for (let i = 0; i < selectedFiles.length; i++) {
        uploadBtn.innerText = `Uploading ${i+1}/${selectedFiles.length}...`;
        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('image', selectedFiles[i]);
        await fetch('/upload', { method: 'POST', body: formData });
    }

    uploadBtn.disabled = false;
    uploadBtn.innerText = "Upload";
    selectedFiles = [];
    dropArea.innerText = "Click to upload images";
    loadGallery();
}

function loadGallery() {
    fetch('/images').then(res => res.json()).then(data => {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // סינון AI משופר: מדלגים על מילים כלליות
            const boringWords = ['clothing', 'apparel', 'fashion', 'sleeve', 'textile', 'person', 'wear'];
            let tagsDisplay = 'Clothing';
            
            if (item.tags && item.tags.length > 0) {
                const specific = item.tags.filter(t => !boringWords.includes(t.toLowerCase())).slice(0, 2);
                if (specific.length > 0) tagsDisplay = specific.join(', ');
            }

            card.innerHTML = `
                <img src="${item.filename}">
                <div class="card-info">
                    <strong>${item.title}</strong><br>
                    <div class="ai-tags">🏷️ ${tagsDisplay}</div><br>
                    <button class="delete-btn" onclick="deleteImg('${item.id}')">Remove</button>
                </div>
            `;
            gallery.appendChild(card);
        });
    });
}

function deleteImg(id) { if(confirm("Delete?")) fetch(`/images/${encodeURIComponent(id)}`, { method: 'DELETE' }).then(loadGallery); }
loadGallery();
</script>
</body>
</html>
