<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clothing Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --danger: #ff4757;
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 { text-align: center; color: #2d3436; margin-bottom: 30px; }

        .upload-box {
            max-width: 550px;
            margin: auto;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .drop-area {
            border: 2px dashed #cbd5e0;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: #718096;
        }

        .drop-area.dragover { background: #edf2f7; border-color: var(--primary); }

        input[type="text"] {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0;
            border-radius: 10px; margin-bottom: 10px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 12px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer;
        }

        button:disabled { background: #a0aec0; }

        .filter-container {
            max-width: 550px; margin: 30px auto; text-align: center;
            background: white; padding: 15px; border-radius: 15px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px; margin-top: 20px;
        }

        .card {
            background: var(--card); border-radius: 15px;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s; display: flex; flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }

        .card img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; }

        .card-info { padding: 15px; }

        .card-title { margin: 0; font-size: 1.1rem; }

        .card-date { font-size: 0.8rem; color: #a0aec0; margin: 5px 0; }

        .ai-tags { font-size: 0.75rem; color: var(--primary); font-weight: 600; }

        .delete-btn {
            background: none; color: var(--danger); width: auto;
            padding: 0; margin-top: 10px; text-decoration: underline; font-size: 0.85rem;
        }

        .modal {
            display: none; position: fixed; background: rgba(0,0,0,0.9);
            top: 0; left: 0; width: 100%; height: 100%;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .modal img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

<h1>Clothing Collection AI</h1>

<div class="upload-box">
    <input type="text" id="title" placeholder="Item Name (e.g. Blue Jeans)">
    <div class="drop-area" id="dropArea">Drag & Drop or Click to Upload</div>
    <input type="file" id="fileInput" hidden>
    <button id="uploadBtn" onclick="uploadImage()">Upload to Gallery</button>
</div>

<div class="filter-container">
    <label>Filter by Category: </label>
    <select id="categoryFilter" onchange="loadGallery()">
        <option value="all">All Items</option>
        <option value="pants">Pants</option>
        <option value="shirt">Shirts / Tops</option>
        <option value="shoes">Shoes</option>
        <option value="dress">Dresses</option>
    </select>
</div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal" onclick="this.style.display='none'">
    <img id="modalImg">
</div>

<script>
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
let selectedFile = null;

dropArea.onclick = () => fileInput.click();
fileInput.onchange = () => {
    selectedFile = fileInput.files[0];
    dropArea.innerText = selectedFile.name;
};

function uploadImage() {
    const title = document.getElementById('title').value;
    if (!selectedFile || !title) return alert("Missing title or file!");

    uploadBtn.disabled = true;
    uploadBtn.innerText = "Analyzing with AI...";

    const formData = new FormData();
    formData.append('title', title);
    formData.append('image', selectedFile);

    fetch('/upload', { method: 'POST', body: formData })
    .then(() => {
        uploadBtn.disabled = false;
        uploadBtn.innerText = "Upload to Gallery";
        document.getElementById('title').value = '';
        dropArea.innerText = "Drag & Drop or Click to Upload";
        selectedFile = null;
        loadGallery();
    });
}

function loadGallery() {
    const filter = document.getElementById('categoryFilter').value;
    fetch('/images')
    .then(res => res.json())
    .then(data => {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';

        const filtered = data.filter(item => 
            filter === 'all' || (item.tags && item.tags.some(t => t.toLowerCase().includes(filter)))
        );

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const uploadDate = new Date(parseInt(item.id)).toLocaleString();
            const tagsText = item.tags ? item.tags.slice(0,3).join(', ') : 'Scanning...';

            card.innerHTML = `
                <img src="${item.filename}" onclick="showModal('${item.filename}')">
                <div class="card-info">
                    <h3 class="card-title">${item.title}</h3>
                    <p class="card-date">Uploaded: ${uploadDate}</p>
                    <div class="ai-tags">AI: ${tagsText}</div>
                    <button class="delete-btn" onclick="deleteImg('${item.id}')">Delete</button>
                </div>
            `;
            gallery.appendChild(card);
        });
    });
}

function showModal(src) {
    document.getElementById('modalImg').src = src;
    document.getElementById('modal').style.display = 'flex';
}

function deleteImg(id) {
    if(confirm("Delete this item?")) {
        fetch(`/images/${id}`, { method: 'DELETE' }).then(loadGallery);
    }
}

loadGallery();
</script>
</body>
</html>
